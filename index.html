<!DOCTYPE html>
<html>
<head>
<style>
body{
 text-align:center;
 margin-top:100px;
 font-family:Arial;
}

button{
 padding:12px 25px;
 font-size:18px;
 border-radius:10px;
 border:none;
}

#yes{
 background:pink;
}

#no{
 background:#ddd;
 position:absolute;
}
</style>
</head>

<body>

<h1>will you buy me a suit? ❤️👗</h1>

<button id="yes" onclick="yes()">Yes 😍</button>
<button id="no" onmouseover="moveNo()">No 😜</button>

<h2 id="text"></h2>

<script>

function moveNo(){
 let x=Math.random()*window.innerWidth;
 let y=Math.random()*window.innerHeight;

 document.getElementById("no").style.left=x+"px";
 document.getElementById("no").style.top=y+"px";
}

function yes(){
 document.getElementById("text").innerHTML=
 "Yayyy ❤️ Thank you husband ji 😍👗";
}

</script>

</body>
</html>
